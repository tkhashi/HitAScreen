name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      DOTNET_VERSION: "10.0.x"
      APP_NAME: "Hit A Screen"
      EXECUTABLE_NAME: "HitAScreen.App"
      PUBLISH_DIR: "artifacts/publish/osx-arm64"
      RELEASE_DIR: "artifacts/release"
      NOTARY_PROFILE: "hitascreen-notary"

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: .NET セットアップ
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 必須シークレット検証
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          set -euo pipefail
          required=(
            APPLE_CERT_P12_BASE64
            APPLE_CERT_PASSWORD
            APPLE_TEAM_ID
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_BUNDLE_ID
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::シークレット ${key} が未設定です。"
              exit 1
            fi
          done

      - name: 依存復元
        run: dotnet restore HitAScreen.slnx

      - name: テスト
        run: dotnet test tests/HitAScreen.Core.Tests/HitAScreen.Core.Tests.csproj --configuration Release --no-restore

      - name: self-contained publish (osx-arm64)
        run: |
          dotnet publish src/HitAScreen.App/HitAScreen.App.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            -o "${PUBLISH_DIR}" \
            --no-restore

      - name: 出力ディレクトリ作成
        run: mkdir -p "${RELEASE_DIR}"

      - name: バージョン情報を環境変数に設定
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="HitAScreen-${VERSION}-macos-arm64.dmg"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "DMG_NAME=${DMG_NAME}" >> "${GITHUB_ENV}"

      - name: AppIcon.icns 生成
        run: |
          scripts/release/create-icns.sh \
            hit-a-screen-icon.png \
            "${RELEASE_DIR}/AppIcon.icns"

      - name: .app バンドル生成
        env:
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
        run: |
          scripts/release/create-app-bundle.sh \
            "${PUBLISH_DIR}" \
            "${APP_NAME}" \
            "${APPLE_BUNDLE_ID}" \
            "${VERSION}" \
            "${EXECUTABLE_NAME}" \
            "${RELEASE_DIR}/AppIcon.icns" \
            "${RELEASE_DIR}"

      - name: 署名証明書をキーチェーンに登録
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="${RUNNER_TEMP}/hitascreen-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="${RUNNER_TEMP}/hitascreen-cert.p12"

          echo "${APPLE_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"

      - name: 署名IDを解決
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [[ -n "${APPLE_CODESIGN_IDENTITY:-}" ]]; then
            identity="${APPLE_CODESIGN_IDENTITY}"
          else
            identity="$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" | awk -F '"' '/Developer ID Application/{print $2; exit}')"
          fi

          if [[ -z "${identity}" ]]; then
            echo "::error::Developer ID Application の署名IDを解決できませんでした。"
            exit 1
          fi

          echo "CODESIGN_IDENTITY=${identity}" >> "${GITHUB_ENV}"

      - name: codesign
        run: |
          scripts/release/codesign-app.sh \
            "${RELEASE_DIR}/${APP_NAME}.app" \
            "${CODESIGN_IDENTITY}" \
            "scripts/release/entitlements.plist"

      - name: notarytool 認証情報登録
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "${NOTARY_PROFILE}" \
            --apple-id "${APPLE_ID}" \
            --team-id "${APPLE_TEAM_ID}" \
            --password "${APPLE_APP_SPECIFIC_PASSWORD}"

      - name: notarize + staple
        run: |
          scripts/release/notarize-and-staple.sh \
            "${RELEASE_DIR}/${APP_NAME}.app" \
            "${NOTARY_PROFILE}"

      - name: dmg 生成
        run: |
          scripts/release/create-dmg.sh \
            "${RELEASE_DIR}/${APP_NAME}.app" \
            "${RELEASE_DIR}/${DMG_NAME}" \
            "HitAScreen"

      - name: SHA256SUMS.txt 生成
        run: |
          cd "${RELEASE_DIR}"
          shasum -a 256 "${DMG_NAME}" > SHA256SUMS.txt

      - name: GitHub Release へ成果物アップロード
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.RELEASE_DIR }}/${{ env.DMG_NAME }}
            ${{ env.RELEASE_DIR }}/SHA256SUMS.txt
          generate_release_notes: true
